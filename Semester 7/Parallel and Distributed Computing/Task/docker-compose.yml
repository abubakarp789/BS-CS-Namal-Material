version: '3.8'

services:
  # NGINX Load Balancer (HORIZONTAL SCALING)
  nginx:
    image: nginx:alpine
    container_name: load_balancer
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
      - app4
    networks:
      - app_network

  # Application Instance 1
  app1:
    build: .
    container_name: app_instance_1
    environment:
      - PORT=5000
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Application Instance 2
  app2:
    build: .
    container_name: app_instance_2
    environment:
      - PORT=5000
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Application Instance 3
  app3:
    build: .
    container_name: app_instance_3
    environment:
      - PORT=5000
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # Application Instance 4
  app4:
    build: .
    container_name: app_instance_4
    environment:
      - PORT=5000
    networks:
      - app_network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

networks:
  app_network:
    driver: bridge