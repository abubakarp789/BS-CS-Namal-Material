<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-white p-3">

  <div class="container-fluid">
    <div class="row g-2 align-items-stretch">

      <!-- Left Margin -->
      <div class="col-1 bg-primary d-flex align-items-center justify-content-center text-white">
        Margin
      </div>

      <!-- Main Content -->
      <div class="col-10">
        <div class="row g-2">

          <!-- Row 1: Gallery | Title + Buy Box -->
          <div class="col-6 d-flex">
            <div class="bg-primary text-white d-flex align-items-center justify-content-center w-100" style="min-height: 350px;">
              Gallery
            </div>
          </div>

          <div class="col-6 d-flex flex-column gap-2" style="min-height: 350px;">
            <!-- Title -->
            <div class="bg-primary text-white d-flex align-items-center justify-content-center py-2">
              Title
            </div>
            <!-- Buy Box -->
            <div class="bg-primary text-white d-flex align-items-center justify-content-center flex-grow-1">
              Buy Box
            </div>
          </div>

          <!-- Row 2: Description -->
          <div class="col-12">
            <div class="bg-primary text-white d-flex align-items-center justify-content-center py-4">
              Description
            </div>
          </div>

          <!-- Row 3: Related -->
          <div class="col-12">
            <div class="bg-primary text-white d-flex align-items-center justify-content-center py-4">
              Related
            </div>
          </div>

        </div>
      </div>

      <!-- Right Margin -->
      <div class="col-1 bg-primary d-flex align-items-center justify-content-center text-white">
        Margin
      </div>

    </div>
  </div>
</body>
</html>
