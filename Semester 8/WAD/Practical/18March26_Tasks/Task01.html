<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Layout</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-5">

  <div class="container-fluid border border-secondary">

    <!-- Row 1: Full width -->
    <div class="row border-bottom border-secondary">
      <div class="col-12 py-4">Header</div>
    </div>

    <!-- Row 2: 4 equal columns -->
    <div class="row border-bottom border-secondary">
      <div class="col-3 border-end border-secondary py-5">Col 1</div>
      <div class="col-3 border-end border-secondary py-5">Col 2</div>
      <div class="col-3 border-end border-secondary py-5">Col 3</div>
      <div class="col-3 py-5">Col 4</div>
    </div>

    <!-- Row 3: Full width -->
    <div class="row">
      <div class="col-12 py-4">Footer</div>
    </div>

  </div>
</body>
</html>
