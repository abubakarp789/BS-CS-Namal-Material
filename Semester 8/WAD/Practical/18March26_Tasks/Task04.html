<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Grid</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .col-demo {
      background-color: #a8bec9;
      border: 2px solid #fff;
      padding: 18px 8px;
      text-align: center;
      margin-bottom: 8px;
    }
  </style>
</head>
<body class="bg-white p-3">
  <div class="container-fluid">

    <!-- Row of 12 x col-1 -->
    <div class="row g-2 mb-1">
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
      <div class="col-1"><div class="col-demo">1</div></div>
    </div>

    <!-- Row of 6 x col-2 -->
    <div class="row g-2 mb-1">
      <div class="col-2"><div class="col-demo">2</div></div>
      <div class="col-2"><div class="col-demo">2</div></div>
      <div class="col-2"><div class="col-demo">2</div></div>
      <div class="col-2"><div class="col-demo">2</div></div>
      <div class="col-2"><div class="col-demo">2</div></div>
      <div class="col-2"><div class="col-demo">2</div></div>
    </div>

    <!-- Row of 4 x col-3 -->
    <div class="row g-2 mb-1">
      <div class="col-3"><div class="col-demo">3</div></div>
      <div class="col-3"><div class="col-demo">3</div></div>
      <div class="col-3"><div class="col-demo">3</div></div>
      <div class="col-3"><div class="col-demo">3</div></div>
    </div>

    <!-- Row of 3 x col-4 -->
    <div class="row g-2 mb-1">
      <div class="col-4"><div class="col-demo">4</div></div>
      <div class="col-4"><div class="col-demo">4</div></div>
      <div class="col-4"><div class="col-demo">4</div></div>
    </div>

    <!-- Row of 2 x col-6 -->
    <div class="row g-2 mb-1">
      <div class="col-6"><div class="col-demo">6</div></div>
      <div class="col-6"><div class="col-demo">6</div></div>
    </div>

    <!-- Row: col-4 + col-8 -->
    <div class="row g-2 mb-1">
      <div class="col-4"><div class="col-demo">4</div></div>
      <div class="col-8"><div class="col-demo">8</div></div>
    </div>

    <!-- Row: col-12 -->
    <div class="row g-2 mb-1">
      <div class="col-12"><div class="col-demo">12</div></div>
    </div>

  </div>
</body>
</html>
